<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Your Character</title>
  <link rel="stylesheet" href="cssreset.css" />
  <style>
    :root {
      --bg: #eef3ec;
      --green: #75c466;
      --text: #111111;
      --subtext: #111111;
      --toggle-bg: #75c466;
      --toggle-circle: #f3f3f3;
    }

    body.dark {
      --bg: #000000;
      --green: #7dff68;
      --text: #ffffff;
      --subtext: #ffffff;
      --toggle-bg: #7dff68;
      --toggle-circle: #f3f3f3;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .landing-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 80px;
      min-height: 100vh;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .landing-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 92px;
      line-height: 0.92;
      color: var(--green);
      font-weight: 700;
      letter-spacing: -1px;
      margin: 0;
    }

    .theme-toggle {
      width: 92px;
      height: 56px;
      background: var(--toggle-bg);
      border: none;
      border-radius: 999px;
      position: relative;
      flex-shrink: 0;
      margin-top: 28px;
      cursor: pointer;
      padding: 0;
    }

    .theme-toggle-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--toggle-circle);
      position: absolute;
      top: 9px;
      left: 9px;
      transition: left 0.28s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    body.dark .theme-toggle-circle {
      left: 45px;
    }

    .character-grid {
      display: flex;
      justify-content: center;
      gap: 110px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .character-card {
      text-align: center;
      width: 360px;
    }

    .character-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .character-photo {
      width: 320px;
      height: 320px;
      margin: 0 auto 20px;
      border-radius: 50%;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .character-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .character-photo:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .character-photo:hover img {
      transform: scale(1.05);
    }

    .character-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      color: var(--green);
      font-weight: 700;
      margin: 0 0 8px;
    }

    .character-role {
      font-size: 18px;
      color: var(--subtext);
      margin: 0;
    }

    @media (max-width: 900px) {
      .landing-page {
        padding: 36px 20px 60px;
      }

      .top-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 36px;
      }

      .landing-title {
        font-size: 60px;
      }

      .theme-toggle {
        margin-top: 0;
      }

      .character-grid {
        gap: 50px;
      }

      .character-card {
        width: 100%;
      }

      .character-photo {
        width: 250px;
        height: 250px;
      }

      .character-name {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="landing-page">
    <div class="top-row">
      <h1 class="landing-title">Choose Your<br />Character !</h1>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" type="button">
        <span class="theme-toggle-circle"></span>
      </button>
    </div>

    <div class="character-grid">
      <a href="./selina.html" class="character-card character-link">
  <div class="character-photo">
    <img src="selina.png" alt="Selina Zhao" />
  </div>
  <h2 class="character-name">Selina Zhao</h2>
  <p class="character-role">Term2 Ixd Student</p>
</a>

      <a href="./portfolio.html" class="character-card character-link">
        <div class="character-photo">
          <img src="anica.png" alt="Anica Qian" />
        </div>
        <h2 class="character-name">Anica Qian</h2>
        <p class="character-role">Term8 Ixd Student</p>
      </a>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

    if (themeToggle) {
      themeToggle.addEventListener("click", function () {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
        } else {
          localStorage.setItem("theme", "light");
        }
      });
    }
  </script>
</body>
</html>
